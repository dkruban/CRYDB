<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Lab Vault</title>
    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #d946ef; /* Fuchsia */
            --secondary: #8b5cf6; /* Violet */
            --accent: #22d3ee; /* Cyan */
            --neon-text: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            color: var(--neon-text);
            height: 100vh;
            overflow: hidden;
        }

        /* --- LAYER 1: PASSWORD SCREEN --- */
        #login-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }

        .login-box {
            background: rgba(20, 20, 20, 0.9);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: center;
            box-shadow: 0 0 50px rgba(217, 70, 239, 0.2);
            position: relative;
        }

        .lock-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }

        #passInput {
            background: #111;
            border: 2px solid #333;
            color: var(--accent);
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border-radius: 10px;
            width: 250px;
            letter-spacing: 5px;
            margin-bottom: 1rem;
            transition: 0.3s;
        }

        #passInput:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }

        .btn-enter {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Shake animation for wrong password */
        @keyframes shakeInput {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); border-color: var(--danger); }
            40%, 80% { transform: translateX(10px); border-color: var(--danger); }
        }
        .shake { animation: shakeInput 0.4s ease-in-out; }

        /* --- LAYER 2: INTRO / ROCK DOOR --- */
        #intro-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #050505;
            z-index: 9999;
            display: none; /* Hidden initially until login */
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
        }

        .click-hint {
            position: absolute;
            color: #444;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: blink 2s infinite;
            pointer-events: none;
            z-index: 20;
        }

        .rock-door {
            position: absolute;
            top: 0;
            height: 100%;
            width: 55%;
            background: #1a1a1a;
            background-image: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #000 100%);
            transition: transform 2.5s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 10;
            box-shadow: inset 0 0 100px #000;
        }

        .rock-left {
            left: 0;
            right: auto;
            border-right: 5px solid #333;
            clip-path: polygon(0 0, 100% 0, 95% 10%, 100% 20%, 92% 30%, 100% 40%, 96% 50%, 100% 60%, 94% 70%, 100% 80%, 93% 90%, 100% 100%, 0 100%);
        }

        .rock-right {
            right: 0;
            left: auto;
            border-left: 5px solid #333;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 7% 90%, 0 80%, 6% 70%, 0 60%, 4% 50%, 0 40%, 8% 30%, 0 20%, 5% 10%);
        }

        @keyframes quake {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-10px, 10px) rotate(-2deg); }
            40% { transform: translate(-10px, -10px) rotate(2deg); }
            60% { transform: translate(10px, 10px) rotate(0deg); }
            80% { transform: translate(10px, -10px) rotate(2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shake-hard {
            animation: quake 0.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* --- LAYER 3: DASHBOARD --- */
        #dashboard-app {
            opacity: 0;
            transition: opacity 1s ease 1s;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            pointer-events: none; /* Locked until doors open */
        }

        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(217, 70, 239, 0.5);
        }

        .btn-main {
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--secondary);
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-main:hover { transform: scale(1.1) rotate(-2deg); box-shadow: 0 0 30px var(--primary); }

        .grid-container {
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding-bottom: 4rem;
        }

        .lab-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 1.5rem;
            position: relative;
            transition: 0.3s;
            cursor: pointer;
            overflow: hidden;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 220px;
        }

        .lab-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 10px 40px rgba(34, 211, 238, 0.2);
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .card-title { font-size: 1.4rem; color: #fff; font-weight: bold; }

        .card-actions { margin-top: auto; display: flex; gap: 10px; }

        .card-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-run { background: var(--primary); color: white; }
        .btn-run:hover { background: var(--secondary); }

        .btn-edit { background: var(--warning); color: black; }
        .btn-edit:hover { background: #fbbf24; }

        .btn-del { background: transparent; color: #555; font-size: 1.2rem; border: 1px solid #333; }
        .btn-del:hover { color: var(--danger); border-color: var(--danger); }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-box {
            background: #1e293b;
            width: 90%; max-width: 800px;
            height: 85vh;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transform: scale(0.9);
            transition: 0.3s;
        }

        .modal-overlay.active .modal-box { transform: scale(1); }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body { flex: 1; padding: 0; position: relative; }

        textarea#codeInput {
            width: 100%; height: 100%;
            background: #0f172a; color: #22d3ee;
            border: none; padding: 1.5rem;
            font-family: 'Courier New', monospace; font-size: 1rem; resize: none;
        }

        iframe { width: 100%; height: 100%; border: none; background: white; }

        .btn-close { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn-save { background: var(--success); color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save.edit-mode { background: var(--accent); color: #000; }

        input.modal-input {
            background: #0f172a; border: 1px solid #334155; color: white;
            padding: 8px 12px; border-radius: 6px; width: 60%; font-size: 1rem;
        }

        /* Mobile responsive */
        @media(max-width: 768px) {
            .rock-door { width: 100%; }
            .rock-right { display: none; }
            .rock-left.open { transform: translateY(-100%); }
            .modal-box { height: 95vh; }
        }
    </style>
</head>
<body>

    <!-- LAYER 1: PASSWORD LOGIN -->
    <div id="login-layer">
        <div class="login-box">
            <span class="lock-icon">🔒</span>
            <h2 style="margin-bottom: 1rem; color: #ccc;">RESTRICTED AREA</h2>
            <input type="password" id="passInput" placeholder="PASSWORD" onkeypress="if(event.key==='Enter') checkPass()">
            <br>
            <button class="btn-enter" onclick="checkPass()">UNLOCK VAULT</button>
            <p id="errorMsg" style="color: var(--danger); margin-top: 10px; font-size: 0.9rem; opacity: 0; transition: 0.3s;">Access Denied</p>
        </div>
    </div>

    <!-- LAYER 2: INTRO / ROCK DOOR -->
    <div id="intro-layer" onclick="handleIntroClick()">
        <div class="rock-door rock-left" id="door-left"></div>
        <div class="rock-door rock-right" id="door-right"></div>
        <div class="click-hint" id="click-hint">Tap Screen 3 Times to Open</div>
    </div>

    <!-- LAYER 3: DASHBOARD -->
    <div id="dashboard-app">
        <header>
            <h1>⚡ Lab Vault</h1>
            <button class="btn-main" onclick="openAddModal()">+ New Experiment</button>
        </header>

        <div class="grid-container" id="labGrid"></div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal-overlay" id="codeModal">
        <div class="modal-box">
            <div class="modal-header">
                <input type="text" id="labNameInput" class="modal-input" placeholder="Experiment Name">
                <div>
                    <button class="btn-close" style="background:#555" onclick="closeModal('codeModal')">Cancel</button>
                    <button class="btn-save" id="saveBtn" onclick="saveLab()">Save Code</button>
                </div>
            </div>
            <div class="modal-body">
                <textarea id="codeInput" placeholder='<h1>Hello World</h1>&#10;<style>body{background: pink;}</style>&#10;<!-- Paste your HTML code here -->'></textarea>
            </div>
        </div>
    </div>

    <!-- PREVIEW MODAL -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="previewTitle" style="color:white;">Running Experiment</h3>
                <button class="btn-close" onclick="closeModal('previewModal')">Close</button>
            </div>
            <div class="modal-body">
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & STATE ---
        let labs = JSON.parse(localStorage.getItem('labVaultData')) || [];
        let editIndex = -1; // -1 means adding new, >= 0 means editing index

        // --- PASSWORD LOGIC ---
        function checkPass() {
            const input = document.getElementById('passInput');
            const errorMsg = document.getElementById('errorMsg');
            
            if (input.value === "MSEC") {
                // Correct Password
                document.getElementById('login-layer').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-layer').style.display = 'none';
                    document.getElementById('intro-layer').style.display = 'flex'; // Show Door
                }, 500);
            } else {
                // Wrong Password
                input.classList.add('shake');
                errorMsg.style.opacity = '1';
                setTimeout(() => {
                    input.classList.remove('shake');
                    errorMsg.style.opacity = '0';
                }, 500);
            }
        }

        // --- INTRO / DOOR LOGIC ---
        let clicks = 0;
        const introLayer = document.getElementById('intro-layer');
        const doorLeft = document.getElementById('door-left');
        const doorRight = document.getElementById('door-right');
        const hint = document.getElementById('click-hint');
        const dashboard = document.getElementById('dashboard-app');

        function handleIntroClick() {
            clicks++;
            hint.innerText = `Tap ${3 - clicks} More Times...`;
            hint.style.color = '#fff';
            
            // Earthquake Shake
            introLayer.classList.remove('shake-hard');
            void introLayer.offsetWidth; 
            introLayer.classList.add('shake-hard');

            if (clicks >= 3) {
                introLayer.style.pointerEvents = 'none';
                hint.style.display = 'none';
                
                setTimeout(() => {
                    introLayer.classList.remove('shake-hard');
                    doorLeft.style.transform = 'translateX(-100%)';
                    doorRight.style.transform = 'translateX(100%)';
                    
                    dashboard.style.opacity = '1';
                    dashboard.style.pointerEvents = 'all'; // Enable interaction
                    document.body.style.overflow = 'auto';
                    
                    setTimeout(() => { introLayer.style.display = 'none'; }, 3000);
                }, 600);
            }
        }

        // --- DASHBOARD LOGIC ---

        function renderLabs() {
            const grid = document.getElementById('labGrid');
            grid.innerHTML = '';

            labs.forEach((lab, index) => {
                const card = document.createElement('div');
                card.className = 'lab-card';
                card.style.animation = `popIn 0.5s ease backwards ${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="card-title">${lab.name}</h3>
                        <button class="card-btn btn-del" onclick="deleteLab(${index}, event)">🗑️</button>
                    </div>
                    <div class="card-actions">
                        <button class="card-btn btn-edit" onclick="openEditModal(${index})">✏️ Edit</button>
                        <button class="card-btn btn-run" onclick="runLab(${index})">▶ Run</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- MODAL FUNCTIONS ---

        function openAddModal() {
            editIndex = -1; // Reset to Add Mode
            document.getElementById('labNameInput').value = '';
            document.getElementById('codeInput').value = '';
            document.getElementById('saveBtn').innerText = "Save Code";
            document.getElementById('saveBtn').classList.remove('edit-mode');
            document.getElementById('codeModal').classList.add('active');
        }

        function openEditModal(index) {
            editIndex = index; // Set to Edit Mode
            const lab = labs[index];
            document.getElementById('labNameInput').value = lab.name;
            document.getElementById('codeInput').value = lab.code;
            
            // Change Button Style for Edit
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Update Code";
            btn.classList.add('edit-mode');
            
            document.getElementById('codeModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function saveLab() {
            const name = document.getElementById('labNameInput').value;
            const code = document.getElementById('codeInput').value;

            if (!name || !code) {
                alert("Please enter a name and code!");
                return;
            }

            if (editIndex > -1) {
                // UPDATE EXISTING
                labs[editIndex] = { name, code };
            } else {
                // ADD NEW
                labs.push({ name, code });
            }

            localStorage.setItem('labVaultData', JSON.stringify(labs));
            closeModal('codeModal');
            renderLabs();
        }

        function deleteLab(index, event) {
            event.stopPropagation();
            if(confirm('Delete this experiment?')) {
                labs.splice(index, 1);
                localStorage.setItem('labVaultData', JSON.stringify(labs));
                renderLabs();
            }
        }

        function runLab(index) {
            const lab = labs[index];
            document.getElementById('previewTitle').innerText = "Running: " + lab.name;
            const iframe = document.getElementById('previewFrame');
            iframe.srcdoc = lab.code;
            document.getElementById('previewModal').classList.add('active');
        }

        // --- INITIAL RENDER ---
        renderLabs();

    </script>
</body>
</html>
