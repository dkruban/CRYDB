<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptography Lab - Ruban M</title>
    <style>
        /* --- ELECTRIC NEON VARIABLES --- */
        :root {
            --bg-dark: #020205;
            --glass: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.15);
            
            /* Electric Palette */
            --neon-blue: #00f3ff;
            --neon-pink: #bc13fe;
            --neon-green: #0aff0a;
            --neon-yellow: #faff00;
            --text-glow: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-glow);
            height: 100vh;
            overflow: hidden;
            /* Dynamic animated background */
            background: linear-gradient(-45deg, #000000, #1a0b2e, #0b1a2e, #000000);
            background-size: 400% 400%;
            animation: bgShift 15s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- LAYER 1: PASSWORD --- */
        #login-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }

        .login-box {
            background: rgba(10, 10, 15, 0.95);
            padding: 3rem;
            border-radius: 20px;
            border: 2px solid var(--neon-blue);
            text-align: center;
            box-shadow: 0 0 30px var(--neon-blue), inset 0 0 20px rgba(0, 243, 255, 0.2);
            position: relative;
            animation: borderPulse 2s infinite;
        }

        @keyframes borderPulse {
            0% { box-shadow: 0 0 10px var(--neon-blue); border-color: var(--neon-blue); }
            50% { box-shadow: 0 0 30px var(--neon-pink); border-color: var(--neon-pink); }
            100% { box-shadow: 0 0 10px var(--neon-blue); border-color: var(--neon-blue); }
        }

        .lock-icon { font-size: 3rem; margin-bottom: 1rem; display: block; filter: drop-shadow(0 0 10px var(--neon-yellow)); }

        #passInput {
            background: #000;
            border: 2px solid #333;
            color: var(--neon-green);
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border-radius: 10px;
            width: 250px;
            letter-spacing: 5px;
            margin-bottom: 1rem;
            font-family: monospace;
            transition: 0.3s;
        }

        #passInput:focus { border-color: var(--neon-green); box-shadow: 0 0 20px var(--neon-green); }

        .btn-enter {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 10px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .btn-enter:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
        }

        @keyframes shakeInput {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); border-color: red; }
            75% { transform: translateX(10px); border-color: red; }
        }
        .shake { animation: shakeInput 0.4s ease-in-out; }

        /* --- LAYER 2: ROCK DOOR --- */
        #intro-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020202;
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
        }

        .click-hint {
            position: absolute;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon-pink);
            animation: blink 1s infinite;
            pointer-events: none;
            z-index: 20;
        }

        .rock-door {
            position: absolute;
            top: 0; height: 100%; width: 55%;
            background: #111;
            background-image: 
                repeating-linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000),
                repeating-linear-gradient(45deg, #000 25%, #1a1a1a 25%, #1a1a1a 75%, #000 75%, #000);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
            transition: transform 3s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 10;
            box-shadow: inset 0 0 50px #000;
            border: 5px solid #333;
        }

        .rock-left { left: 0; clip-path: polygon(0 0, 100% 0, 90% 15%, 100% 30%, 85% 45%, 100% 60%, 90% 75%, 100% 100%, 0 100%); }
        .rock-right { right: 0; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 10% 75%, 0 60%, 15% 45%, 0 30%, 10% 15%); }

        @keyframes quake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-15px, 15px) rotate(-3deg); }
            50% { transform: translate(-15px, -15px) rotate(3deg); }
            75% { transform: translate(15px, 15px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shake-hard { animation: quake 0.3s ease-in-out infinite; }

        @keyframes blink { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }

        /* --- LAYER 3: DASHBOARD --- */
        #dashboard-app {
            opacity: 0;
            transition: opacity 1s ease 1s;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            overflow-y: auto;
            pointer-events: none;
            position: relative;
        }

        /* Electric Grid Background Overlay */
        #dashboard-app::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0; pointer-events: none;
        }

        header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 5px 30px rgba(0, 243, 255, 0.2);
        }

        h1 {
            font-size: 1.8rem;
            color: #fff;
            text-transform: uppercase;
            font-weight: 900;
            /* Electric Text Glow */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px var(--neon-blue),
                0 0 40px var(--neon-blue),
                0 0 80px var(--neon-blue);
            letter-spacing: 2px;
            animation: textFlicker 3s infinite alternate;
        }

        @keyframes textFlicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 10px var(--neon-blue); }
            20%, 24%, 55% { opacity: 0.5; text-shadow: none; }
        }

        /* --- PROFILE BADGE --- */
        .profile-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .profile-container::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .profile-container:hover::before { left: 100%; }
        .profile-container:hover { border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); }

        .avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #000;
            font-size: 1.2rem;
            border: 2px solid #fff;
        }

        .profile-info { display: flex; flex-direction: column; line-height: 1.2; }
        .p-name { font-weight: bold; color: #fff; font-size: 0.9rem; text-shadow: 0 0 5px var(--neon-pink); }
        .p-roll { font-size: 0.75rem; color: var(--neon-blue); font-family: monospace; letter-spacing: 1px; }

        .btn-main {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
            border: none;
            color: white;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 0 40px rgba(0, 243, 255, 0.8); }
        
        /* --- LAB GRID & CARDS --- */
        .grid-container {
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
            padding-bottom: 4rem;
            position: relative; z-index: 10;
        }

        .lab-card {
            background: rgba(10, 10, 15, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            position: relative;
            transition: 0.4s;
            cursor: pointer;
            overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
            height: 240px;
            backdrop-filter: blur(10px);
        }

        /* Electric Border Animation on Hover */
        .lab-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--neon-blue));
            animation: rotateBorder 4s linear infinite;
            opacity: 0;
            transition: 0.3s;
        }

        .lab-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 0 30px rgba(0, 243, 255, 0.2); }
        .lab-card:hover::after { opacity: 1; }

        @keyframes rotateBorder { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .card-content { position: relative; z-index: 2; background: inherit; height: 100%; display: flex; flex-direction: column; justify-content: space-between; border-radius: 12px; padding: 5px;}

        .card-title { font-size: 1.3rem; color: #fff; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        .card-actions { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-top: 15px; }

        .card-btn {
            padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: 0.2s;
        }

        .btn-run { background: var(--neon-green); color: #000; }
        .btn-run:hover { box-shadow: 0 0 15px var(--neon-green); }

        .btn-edit { background: var(--neon-yellow); color: #000; }
        .btn-edit:hover { box-shadow: 0 0 15px var(--neon-yellow); }

        .btn-del { background: transparent; color: #555; font-size: 1.2rem; border: 1px solid #444; }
        .btn-del:hover { color: #fff; border-color: #fff; box-shadow: 0 0 10px #fff; }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 500;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }

        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-box {
            background: #0a0a0f; width: 90%; max-width: 850px; height: 85vh;
            border-radius: 20px; border: 1px solid var(--neon-blue);
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            display: flex; flex-direction: column;
            transform: scale(0.9); transition: 0.3s;
        }

        .modal-overlay.active .modal-box { transform: scale(1); }

        .modal-header {
            padding: 1.5rem; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 243, 255, 0.05);
        }

        .modal-body { flex: 1; padding: 0; position: relative; }

        textarea#codeInput {
            width: 100%; height: 100%; background: #000; color: var(--neon-green);
            border: none; padding: 1.5rem; font-family: 'Courier New', monospace; font-size: 1rem; resize: none;
        }

        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        .btn-close { background: #ff3333; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; }
        .btn-save { background: var(--neon-blue); color: #000; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save.edit-mode { background: var(--neon-pink); color: white; }

        input.modal-input {
            background: #000; border: 1px solid #333; color: var(--neon-blue);
            padding: 10px 15px; border-radius: 6px; width: 50%; font-size: 1rem; font-weight: bold;
        }

        @media(max-width: 768px) {
            .rock-door { width: 100%; }
            .rock-right { display: none; }
            .rock-left.open { transform: translateY(-100%); }
            .profile-container { padding: 5px 10px; }
            .p-name { font-size: 0.8rem; }
            .p-roll { font-size: 0.6rem; }
            h1 { font-size: 1.2rem; }
            .btn-main { padding: 8px 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <!-- LAYER 1: PASSWORD (MSEC) -->
    <div id="login-layer">
        <div class="login-box">
            <span class="lock-icon">🔒</span>
            <h2 style="margin-bottom: 1rem; color: #ccc;">SECURE ACCESS</h2>
            <input type="password" id="passInput" placeholder="PASSWORD" onkeypress="if(event.key==='Enter') checkPass()">
            <br><br>
            <button class="btn-enter" onclick="checkPass()">UNLOCK SYSTEM</button>
            <p id="errorMsg" style="color: #ff3333; margin-top: 15px; font-size: 0.9rem; opacity: 0; transition: 0.3s; text-shadow: 0 0 5px red;">ACCESS DENIED</p>
        </div>
    </div>

    <!-- LAYER 2: ROCK DOOR INTRO -->
    <div id="intro-layer" onclick="handleIntroClick()">
        <div class="rock-door rock-left" id="door-left"></div>
        <div class="rock-door rock-right" id="door-right"></div>
        <div class="click-hint" id="click-hint">TAP 3 TIMES TO INITIALIZE</div>
    </div>

    <!-- LAYER 3: DASHBOARD -->
    <div id="dashboard-app">
        <header>
            <!-- Title -->
            <h1>Cryptography <br><span style="font-size: 0.6em; color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink);">Semester 6 Laboratory</span></h1>
            
            <!-- Profile (RUBAN M, 23bcsl06) -->
            <div class="profile-container">
                <div class="avatar">RM</div>
                <div class="profile-info">
                    <span class="p-name">RUBAN M</span>
                    <span class="p-roll">Roll No: 23bcsl06</span>
                </div>
            </div>

            <!-- Add Button -->
            <button class="btn-main" onclick="openAddModal()">+ New Experiment</button>
        </header>

        <div class="grid-container" id="labGrid"></div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal-overlay" id="codeModal">
        <div class="modal-box">
            <div class="modal-header">
                <input type="text" id="labNameInput" class="modal-input" placeholder="Experiment Name">
                <div>
                    <button class="btn-close" style="background:#444" onclick="closeModal('codeModal')">Cancel</button>
                    <button class="btn-save" id="saveBtn" onclick="saveLab()">Save Code</button>
                </div>
            </div>
            <div class="modal-body">
                <textarea id="codeInput" placeholder="<!-- Paste your HTML/CSS/JS experiment here -->"></textarea>
            </div>
        </div>
    </div>

    <!-- PREVIEW MODAL -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="previewTitle" style="color:white; text-shadow: 0 0 5px var(--neon-green);">Running Experiment</h3>
                <button class="btn-close" onclick="closeModal('previewModal')">Terminate</button>
            </div>
            <div class="modal-body">
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & STATE ---
        let labs = JSON.parse(localStorage.getItem('cryptoLabData')) || [];
        let editIndex = -1;

        // --- PASSWORD LOGIC ---
        function checkPass() {
            const input = document.getElementById('passInput');
            const errorMsg = document.getElementById('errorMsg');
            
            if (input.value === "MSEC") {
                document.getElementById('login-layer').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-layer').style.display = 'none';
                    document.getElementById('intro-layer').style.display = 'flex';
                }, 500);
            } else {
                input.classList.add('shake');
                errorMsg.style.opacity = '1';
                setTimeout(() => {
                    input.classList.remove('shake');
                    errorMsg.style.opacity = '0';
                }, 500);
            }
        }

        // --- INTRO / DOOR LOGIC ---
        let clicks = 0;
        const introLayer = document.getElementById('intro-layer');
        const doorLeft = document.getElementById('door-left');
        const doorRight = document.getElementById('door-right');
        const hint = document.getElementById('click-hint');
        const dashboard = document.getElementById('dashboard-app');

        function handleIntroClick() {
            clicks++;
            hint.innerText = `INITIALIZING... ${3 - clicks}`;
            hint.style.color = 'var(--neon-green)';
            hint.style.textShadow = '0 0 10px var(--neon-green)';
            
            introLayer.classList.remove('shake-hard');
            void introLayer.offsetWidth; 
            introLayer.classList.add('shake-hard');

            if (clicks >= 3) {
                introLayer.style.pointerEvents = 'none';
                hint.style.display = 'none';
                
                setTimeout(() => {
                    introLayer.classList.remove('shake-hard');
                    doorLeft.style.transform = 'translateX(-100%)';
                    doorRight.style.transform = 'translateX(100%)';
                    
                    dashboard.style.opacity = '1';
                    dashboard.style.pointerEvents = 'all';
                    document.body.style.overflow = 'auto';
                    
                    setTimeout(() => { introLayer.style.display = 'none'; }, 3000);
                }, 600);
            }
        }

        // --- DASHBOARD LOGIC ---

        function renderLabs() {
            const grid = document.getElementById('labGrid');
            grid.innerHTML = '';

            labs.forEach((lab, index) => {
                const card = document.createElement('div');
                card.className = 'lab-card';
                card.style.animation = `popIn 0.5s ease backwards ${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="card-content">
                        <div>
                            <h3 class="card-title">${lab.name}</h3>
                            <div style="height: 1px; width: 100%; background: linear-gradient(90deg, var(--neon-pink), transparent); margin: 10px 0;"></div>
                        </div>
                        <div class="card-actions">
                            <button class="card-btn btn-edit" onclick="openEditModal(${index})">✏️ Edit</button>
                            <button class="card-btn btn-run" onclick="runLab(${index})">▶ Run</button>
                            <button class="card-btn btn-del" onclick="deleteLab(${index}, event)">🗑️</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openAddModal() {
            editIndex = -1;
            document.getElementById('labNameInput').value = '';
            document.getElementById('codeInput').value = '';
            document.getElementById('saveBtn').innerText = "Save Code";
            document.getElementById('saveBtn').classList.remove('edit-mode');
            document.getElementById('codeModal').classList.add('active');
        }

        function openEditModal(index) {
            editIndex = index;
            const lab = labs[index];
            document.getElementById('labNameInput').value = lab.name;
            document.getElementById('codeInput').value = lab.code;
            
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Update Code";
            btn.classList.add('edit-mode');
            
            document.getElementById('codeModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function saveLab() {
            const name = document.getElementById('labNameInput').value;
            const code = document.getElementById('codeInput').value;

            if (!name || !code) {
                alert("Input required!");
                return;
            }

            if (editIndex > -1) {
                labs[editIndex] = { name, code };
            } else {
                labs.push({ name, code });
            }

            localStorage.setItem('cryptoLabData', JSON.stringify(labs));
            closeModal('codeModal');
            renderLabs();
        }

        function deleteLab(index, event) {
            event.stopPropagation();
            if(confirm('Delete experiment?')) {
                labs.splice(index, 1);
                localStorage.setItem('cryptoLabData', JSON.stringify(labs));
                renderLabs();
            }
        }

        function runLab(index) {
            const lab = labs[index];
            document.getElementById('previewTitle').innerText = "Running: " + lab.name;
            const iframe = document.getElementById('previewFrame');
            iframe.srcdoc = lab.code;
            document.getElementById('previewModal').classList.add('active');
        }

        renderLabs();
    </script>
</body>
</html>
